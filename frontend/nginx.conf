server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # ---- Reverse-proxy API requests to the FastAPI backend -----------------
    # The frontend Axios client uses baseURL = "/api", so every call lands
    # here. We strip the /api prefix before forwarding, since the backend
    # routes are mounted at / (e.g. /dashboard/summary, /environmental/goals).
    location /api/ {
        proxy_pass         http://ecosphere_backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # ---- Proxy uploaded file access ----------------------------------------
    location /uploads/ {
        proxy_pass         http://ecosphere_backend:8000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Cache hashed static assets aggressively
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # React Router (client-side routing) — always fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
