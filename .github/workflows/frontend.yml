name: Frontend PR Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
      - '!frontend/**/*.md'
      - '!frontend/**/README.md'
      - '!frontend/**/readme.md'

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: hashFiles('frontend/package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: hashFiles('frontend/package.json') != ''
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run React build
        if: hashFiles('frontend/package.json') != ''
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)"; then
            npm run build
          else
            echo "No build script configured; skipping build."
          fi

      - name: Run lint if configured
        if: hashFiles('frontend/package.json') != ''
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script configured; skipping lint."
          fi

      - name: Run type checks if configured
        if: hashFiles('frontend/package.json') != ''
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.typecheck ? 0 : 1)"; then
            npm run typecheck
          else
            echo "No typecheck script configured; skipping type checks."
          fi

      - name: Run tests if configured
        if: hashFiles('frontend/package.json') != ''
        env:
          CI: true
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)"; then
            npm test -- --watch=false
          else
            echo "No test script configured; skipping tests."
          fi

      - name: Report missing app files
        if: hashFiles('frontend/package.json') == ''
        run: |
          echo "No React app manifest was found in frontend/."
          echo "This workflow will validate the app once package.json is added."
